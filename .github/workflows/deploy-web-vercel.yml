# Build Flutter web and deploy to Vercel (uses existing Railway backend).
# Add secrets: VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID
name: Build and deploy web to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  # Avoid Node 20 deprecation warnings for actions/checkout until default runner updates.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get
        working-directory: frontend

      - name: Build web
        run: flutter build web --release
        working-directory: frontend

      # Flutter is already built above; --prebuilt requires `vercel build` + .vercel/output.
      # Publish static web output with SPA rewrites only (no remote buildCommand).
      - name: Copy vercel.json and package.json into build output
        run: |
          cp frontend/vercel.ci-static.json frontend/build/web/vercel.json
          cp frontend/package.ci-web.json frontend/build/web/package.json

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Deploy to Vercel
        run: vercel deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: frontend/build/web
