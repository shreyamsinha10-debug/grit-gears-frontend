# Optional Vercel CLI deploy from GitHub Actions. If VERCEL_TOKEN, VERCEL_ORG_ID,
# and VERCEL_PROJECT_ID are not all set as repository secrets, the Flutter+Vercel
# job is skipped (workflow still succeeds). You can still deploy via Vercel’s
# Git integration on the repo linked in the Vercel dashboard (e.g. grit-gears-frontend).
name: Build and deploy web to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    if: ${{ secrets.VERCEL_TOKEN != '' && secrets.VERCEL_ORG_ID != '' && secrets.VERCEL_PROJECT_ID != '' }}
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-web-vercel-${{ github.ref }}
      cancel-in-progress: true
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Trust Flutter SDK path for Git
        run: |
          if [ -n "${FLUTTER_ROOT:-}" ]; then
            git config --global --add safe.directory "$FLUTTER_ROOT"
          fi

      - name: Get dependencies
        run: flutter pub get
        working-directory: frontend

      - name: Build web
        run: flutter build web --release
        working-directory: frontend

      - name: Copy vercel.json and package.json into build output
        run: |
          cp frontend/vercel.ci-static.json frontend/build/web/vercel.json
          cp frontend/package.ci-web.json frontend/build/web/package.json

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Deploy to Vercel
        run: vercel deploy --prod --yes
        working-directory: frontend/build/web

  vercel-cli-skipped:
    if: ${{ secrets.VERCEL_TOKEN == '' || secrets.VERCEL_ORG_ID == '' || secrets.VERCEL_PROJECT_ID == '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Skip Vercel CLI (secrets not configured)
        run: |
          echo "::notice::Skipping Vercel CLI deploy — add repository secrets VERCEL_TOKEN, VERCEL_ORG_ID, and VERCEL_PROJECT_ID (Settings → Secrets and variables → Actions) to run deploy from Actions. Deployments can still run when Vercel is connected to Git on another repository."
